<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listas de Precios Fibra | DS3 Comunicaciones</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: transparent;
      font-family: "Poppins", Arial, sans-serif;
      color: #0f172a;
      overflow: hidden;
    }

    .price-card {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      padding: 16px 12px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .06);
    }

    .price-card h2 {
      margin: 0 0 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
      color: #020617;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }

    .price-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .price-list a {
      display: block;
      border: 1px solid #dbe4ef;
      border-radius: 6px;
      background: #f8fafc;
      padding: 12px;
      color: #049FD9;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
      transition: background .2s ease, border-color .2s ease, padding-left .2s ease;
    }

    .price-list a:hover,
    .price-list a:focus {
      border-color: #b9dff1;
      background: #eef7ff;
      padding-left: 16px;
      outline: none;
    }
  </style>
</head>

<body>
  <section class="price-card" aria-label="Listas de precios de fibra">
    <h2>Listas de Precios<br />(Fibra)</h2>
    <ul class="price-list">
      <li><a href="https://www.ds3comunicaciones.com/AMP/precios_amp.html" target="_blank">Lista AMP</a></li>
      <li><a href="https://www.ds3comunicaciones.com/amphenol/precios_amphenol.html" target="_blank">Lista Amphenol</a></li>
      <li><a href="https://www.ds3comunicaciones.com/cisco/precios_cisco_b.html" target="_blank">Lista CISCO</a></li>
      <li><a href="https://www.ds3comunicaciones.com/mikrotik/precios_mikrotik.html" target="_blank">Lista MikroTik</a></li>
      <li><a href="https://www.ds3comunicaciones.com/panduit/precios_panduit.html" target="_blank">Lista Panduit</a></li>
      <li><a href="https://www.ds3comunicaciones.com/siemon/precios_siemon.html" target="_blank">Lista Siemon</a></li>
      <li><a href="https://www.ds3comunicaciones.com/ubiquiti/precios_ubiquiti.html" target="_blank">Lista Ubiquiti</a></li>
      <li><a href="https://www.ds3comunicaciones.com/datatronix/precios_datatronix.html" target="_blank">Lista DATATRONIX</a></li>
    </ul>
  </section>
</body>

</html>
